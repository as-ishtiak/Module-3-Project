name: Node.js CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests (Skip if not available)
        run: |
          npm test --if-present > test-results.txt 2>&1 || echo "No tests found" > test-results.txt

      - name: Upload Test Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results

      - name: Show Test Results
        run: cat test-results.txt

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Install PM2
        run: npm install -g pm2

      - name: Deploy App
        run: |
          pm2 stop my-app || true
          pm2 start src/server.js --name my-app || echo "Server file not found"