name: Node.js CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  test:
    runs-on: ubuntu-latest  # self-hosted না ব্যবহার করে

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: |
          npm test --if-present > test-results.txt 2>&1 || echo "No tests found" > test-results.txt
          echo "=== Test Results ==="
          cat test-results.txt

      - name: Upload Test Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt

  deploy:
    needs: test
    runs-on: ubuntu-latest  # self-hosted থেকে পরিবর্তন করুন

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results
      
      - name: Show Test Results
        run: |
          if [ -f "test-results.txt" ]; then
            cat test-results.txt
          else
            echo "No test results file found"
          fi

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Deploy App
        run: |
          echo "Deployment started..."
          # আপনার deploy কমান্ড এখানে দিন
          echo "Deployment completed!"