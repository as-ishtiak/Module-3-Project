name: Node.js CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: |
          npm test --if-present > test-results.txt 2>&1 || echo "No tests found" > test-results.txt

      - name: Upload Test Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt

  deploy:
    needs: test
    runs-on: ubuntu-latest  # self-hosted থেকে পরিবর্তন করুন

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results

      - name: Show Test Results
        run: cat test-results.txt

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Install PM2 (optional, for local testing)
        run: |
          if command -v pm2 &> /dev/null; then
            echo "PM2 already installed"
          else
            npm install -g pm2
          fi

      - name: Deploy App (Simulated)
        run: |
          echo "Deployment simulation..."
          echo "✅ Deploy job completed successfully"
          # pm2 stop my-app || true
          # pm2 start src/server.js --name my-app