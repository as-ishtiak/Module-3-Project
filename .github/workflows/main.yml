name: Node.js CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: |
          npm test --if-present > test-results.txt 2>&1 || echo "No tests" > test-results.txt

      - name: Upload Test Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt

  deploy:
    needs: test
    runs-on: [self-hosted, linux]  # সঠিক সিনট্যাক্স
    
    # Error হ্যান্ডলিং
    continue-on-error: true
    
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results

      - name: Show Test Results
        run: cat test-results.txt

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Install PM2
        run: npm install -g pm2

      - name: Check if server.js exists
        run: |
          if [ ! -f src/server.js ]; then
            echo "Warning: src/server.js not found"
            mkdir -p src
            echo "console.log('Server started');" > src/server.js
          fi

      - name: Deploy App
        run: |
          pm2 stop my-app || true
          pm2 start src/server.js --name my-app
          pm2 save
          pm2 list